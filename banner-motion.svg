<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F8FAFC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="nameClip">
      <text x="100" y="145" font-family="Georgia, 'Times New Roman', serif"
            font-size="54" font-weight="700">Elakkiyalossini</text>
    </clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- flowing wave layer 1 -->
  <g>
    <path fill="url(#waveGrad1)">
      <animate attributeName="d" dur="7s" repeatCount="indefinite"
        values="
        M0,220 C150,190 300,250 450,220 C600,190 750,250 900,220 C1050,190 1150,220 1200,210 L1200,300 L0,300 Z;
        M0,230 C150,260 300,200 450,230 C600,260 750,200 900,230 C1050,260 1150,230 1200,240 L1200,300 L0,300 Z;
        M0,220 C150,190 300,250 450,220 C600,190 750,250 900,220 C1050,190 1150,220 1200,210 L1200,300 L0,300 Z"/>
    </path>
  </g>

  <!-- flowing wave layer 2, offset speed for parallax -->
  <g>
    <path fill="url(#waveGrad2)">
      <animate attributeName="d" dur="5s" repeatCount="indefinite"
        values="
        M0,250 C200,225 400,270 600,250 C800,230 1000,270 1200,250 L1200,300 L0,300 Z;
        M0,260 C200,280 400,235 600,260 C800,285 1000,235 1200,260 L1200,300 L0,300 Z;
        M0,250 C200,225 400,270 600,250 C800,230 1000,270 1200,250 L1200,300 L0,300 Z"/>
    </path>
  </g>

  <!-- floating particles drifting upward -->
  <g fill="#7DD3FC">
    <circle cx="150" cy="280" r="2.5" opacity="0.8">
      <animate attributeName="cy" values="280;20;280" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="290" r="2" opacity="0.7">
      <animate attributeName="cy" values="290;30;290" dur="11s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="11s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="270" r="3" opacity="0.6">
      <animate attributeName="cy" values="270;10;270" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="8s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="285" r="2" opacity="0.75">
      <animate attributeName="cy" values="285;25;285" dur="10s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="10s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="275" r="2.5" opacity="0.7">
      <animate attributeName="cy" values="275;15;275" dur="9.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="9.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="290" r="2" opacity="0.6">
      <animate attributeName="cy" values="290;30;290" dur="10.5s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="10.5s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1130" cy="270" r="2.5" opacity="0.8">
      <animate attributeName="cy" values="270;10;270" dur="8.5s" begin="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8.5s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- accent line -->
  <rect x="80" y="118" width="4" height="70" fill="#38BDF8"/>

  <!-- name with moving light sweep -->
  <text x="100" y="145" font-family="Georgia, 'Times New Roman', serif"
        font-size="54" font-weight="700" fill="#F8FAFC">
    Elakkiyalossini
  </text>
  <g clip-path="url(#nameClip)">
    <rect x="-200" y="80" width="200" height="90" fill="url(#sweep)">
      <animate attributeName="x" values="-200;600" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- tagline -->
  <text x="100" y="182" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#94A3B8">
    Data Analyst in the making &#183; SQL &#183; Python &#183; Excel &#183; Power BI
  </text>

  <!-- role tag pill -->
  <rect x="100" y="205" width="310" height="34" rx="17" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-opacity="0.4"/>
  <text x="118" y="227" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#7DD3FC">
    Final-year B.Sc Computer Science Student
  </text>
</svg>
